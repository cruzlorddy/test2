                 const response = await fetch(

        )
        const data = await response.json()

        output.textContent = data.setup + " ... " + data.punchline
        
        } catch (error) {
            console.log("Error:", error.message)
            errorOutput.textContent = "Failed to fetch a joke. Please try again." + error.message       
        } finally {
            btn.textContent = "Get a joke"
            btn.disabled = false
        }
    }
